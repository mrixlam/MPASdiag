name: Feature request
description: Suggest a new capability or improvement for MPASdiag
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe what you would
        like to see and why it would be useful.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I have searched the [existing issues](https://github.com/mrixlam/MPASdiag/issues) and this has not been requested.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: >
        What problem does this feature solve? Is your request related to a
        limitation you have run into? e.g. "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: A clear description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you have considered.

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Which part of the package does this relate to?
      multiple: true
      options:
        - Data processing / I/O
        - 2D diagnostics
        - 3D diagnostics (soundings, cross-sections, IVT)
        - Visualization / plotting
        - Remapping / regridding
        - Parallel / performance
        - CLI
        - Documentation
        - Other

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context, references, or sample figures about the request here.
