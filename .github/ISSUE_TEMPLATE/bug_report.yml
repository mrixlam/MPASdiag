name: Bug report
description: Report a problem or unexpected behavior in MPASdiag
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out the
        sections below so we can reproduce and fix the issue quickly.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I have searched the [existing issues](https://github.com/mrixlam/MPASdiag/issues) and this has not been reported.
          required: true
        - label: I am using a supported Python version (3.10–3.13).
          required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: >
        A minimal, self-contained code snippet or CLI command that reproduces
        the problem. Please remove any unrelated code.
      placeholder: |
        ```python
        import mpasdiag
        ...
        ```
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: traceback
    attributes:
      label: Error output / traceback
      description: If applicable, paste the full traceback or error message.
      render: shell

  - type: input
    id: version
    attributes:
      label: MPASdiag version
      description: "Output of `python -c \"import mpasdiag; print(mpasdiag.__version__)\"`"
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.11"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment details
      description: >
        How did you install MPASdiag (conda, pip, source)? Please include
        relevant package versions (uxarray, mpi4py, metpy, cartopy, etc.).
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context, screenshots, or sample data about the problem here.
